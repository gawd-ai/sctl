[target.armv7-unknown-linux-musleabihf]
linker = "arm-linux-musleabihf-gcc"

# ts-rs typegen — runs via `cargo test export_bindings`.
# Writes one .ts file per #[ts(export)] type into web/src/lib/types/generated/.
# `large_int = number` collapses u64/i64 → number (file sizes & elapsed_ms
# all fit comfortably in JS Number; we don't need BigInt precision).
[env]
TS_RS_EXPORT_DIR = { value = "../web/src/lib/types/generated", relative = true }
TS_RS_LARGE_INT = "number"
